definitions:
  api.AddAppRequest:
    properties:
      allow_notifications:
        type: boolean
      app_name:
        type: string
      auto_launch:
        type: boolean
      default_shortcut:
        type: boolean
      package_name:
        type: string
    type: object
  api.AssignPolicyRequest:
    properties:
      device_ids:
        items:
          type: string
        type: array
      group_ids:
        items:
          type: string
        type: array
    type: object
  api.BatchCommandRequest:
    properties:
      all:
        type: boolean
      device_ids:
        items:
          type: string
        type: array
      group_ids:
        items:
          type: string
        type: array
      params:
        additionalProperties: true
        type: object
      timeout:
        example: 30
        type: integer
      type:
        example: setScreen
        type: string
    type: object
  api.BulkCreateDevicesInput:
    properties:
      count:
        type: integer
      group_id:
        type: string
      prefix:
        type: string
    type: object
  api.CommandRequest:
    properties:
      params:
        additionalProperties: true
        type: object
      priority:
        example: 0
        type: integer
      timeout:
        example: 30
        type: integer
      type:
        example: setScreen
        type: string
    required:
    - type
    type: object
  api.CommandResponse:
    properties:
      command_id:
        example: cmd-uuid-1234
        type: string
      duration:
        example: 150
        type: integer
      error:
        example: ""
        type: string
      result:
        additionalProperties: true
        type: object
      success:
        example: true
        type: boolean
    type: object
  api.CreateDeviceInput:
    properties:
      group_key:
        type: string
      name:
        type: string
    type: object
  api.CreateGroupInput:
    properties:
      broadcast_sound:
        type: string
      name:
        type: string
      update_policy:
        type: string
    type: object
  api.CreatePolicyRequest:
    properties:
      app_whitelist:
        items:
          $ref: '#/definitions/models.AppWhitelistEntry'
        type: array
      description:
        type: string
      name:
        type: string
      settings:
        $ref: '#/definitions/models.SecurityPolicySettings'
    type: object
  api.ErrorResponse:
    properties:
      error:
        example: error message
        type: string
    type: object
  api.RefreshTokenRequest:
    properties:
      refresh_token:
        example: xxx
        type: string
    type: object
  api.SendBroadcastInput:
    properties:
      created_by:
        type: string
      group_id:
        type: string
      message:
        type: string
      sound:
        type: string
    type: object
  api.SetWhitelistInput:
    properties:
      whitelist:
        items:
          type: string
        type: array
    type: object
  api.TokenRequest:
    properties:
      device_key:
        example: device-key-xxx
        type: string
      tenant_id:
        example: tenant001
        type: string
    type: object
  api.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_at:
        example: 1700000000000
        type: integer
      refresh_token:
        example: xxx
        type: string
      token_type:
        example: Bearer
        type: string
    type: object
  api.UpdateDeviceInput:
    properties:
      name:
        type: string
    type: object
  api.UpdatePolicyRequest:
    properties:
      app_whitelist:
        items:
          $ref: '#/definitions/models.AppWhitelistEntry'
        type: array
      description:
        type: string
      name:
        type: string
      settings:
        $ref: '#/definitions/models.SecurityPolicySettings'
    type: object
  api.ValidateDeviceResponse:
    properties:
      device_id:
        example: device001
        type: string
      valid:
        example: true
        type: boolean
    type: object
  models.AppHardeningConfig:
    properties:
      allow_background_switch:
        description: 允许后台应用切换
        type: boolean
      allow_recent_apps:
        description: 允许最近应用
        type: boolean
      allow_return_key:
        description: 允许返回键
        type: boolean
      force_full_screen:
        description: 强制全屏
        type: boolean
      hide_home_indicator:
        description: 隐藏 Home 指示器
        type: boolean
    type: object
  models.AppWhitelistEntry:
    properties:
      allow_notifications:
        description: 允许通知
        type: boolean
      app_name:
        description: 应用名称
        type: string
      auto_launch:
        description: 自启动
        type: boolean
      default_shortcut:
        description: 显示默认快捷方式
        type: boolean
      package_name:
        description: 包名
        type: string
    type: object
  models.BindRequest:
    properties:
      api_key:
        type: string
      device_id:
        type: string
      group_key:
        type: string
      hub_url:
        type: string
    type: object
  models.BindResponse:
    properties:
      broadcast_sound:
        type: string
      device_id:
        type: string
      device_name:
        type: string
      group_id:
        type: string
      group_name:
        type: string
      mqtt_broker_url:
        description: MQTT Broker info for tablet connection
        type: string
      mqtt_port:
        type: integer
      signing_pubkey:
        type: string
      update_policy:
        type: string
    type: object
  models.Broadcast:
    properties:
      created_at:
        type: integer
      created_by:
        type: string
      delivered_count:
        type: integer
      failed_count:
        type: integer
      group_id:
        type: string
      id:
        type: string
      message:
        type: string
      sound:
        type: string
    type: object
  models.Command:
    properties:
      id:
        type: string
      params:
        additionalProperties: true
        type: object
      priority:
        type: integer
      timeout:
        description: 秒
        type: integer
      timestamp:
        type: string
      type:
        $ref: '#/definitions/models.CommandType'
    type: object
  models.CommandPoll:
    properties:
      broadcast:
        type: string
      ota_url:
        type: string
      whitelist:
        items:
          type: string
        type: array
    type: object
  models.CommandType:
    enum:
    - setBrightness
    - setScreen
    - setVolume
    - navigate
    - reload
    - reboot
    - clearCache
    - updateApp
    - screenshot
    - getLogs
    - getWifiInfo
    - installApp
    - uninstallApp
    - setRotation
    - setKioskMode
    - playSound
    - stopSound
    - speak
    - wakeUp
    - sleep
    - setPin
    type: string
    x-enum-varnames:
    - CommandSetBrightness
    - CommandSetScreen
    - CommandSetVolume
    - CommandNavigate
    - CommandReload
    - CommandReboot
    - CommandClearCache
    - CommandUpdateApp
    - CommandScreenshot
    - CommandGetLogs
    - CommandGetWifiInfo
    - CommandInstallApp
    - CommandUninstallApp
    - CommandSetRotation
    - CommandSetKioskMode
    - CommandPlaySound
    - CommandStopSound
    - CommandSpeak
    - CommandWakeUp
    - CommandSleep
    - CommandSetPin
  models.DeviceInfo:
    properties:
      android_version:
        type: string
      app_version:
        type: string
      battery_charging:
        type: boolean
      battery_level:
        type: integer
      brand:
        type: string
      free_memory:
        type: integer
      free_storage:
        type: integer
      imei:
        type: string
      model:
        type: string
      screen_brightness:
        type: integer
      screen_on:
        type: boolean
      sdk_version:
        type: integer
      serial_number:
        type: string
      total_memory:
        type: integer
      total_storage:
        type: integer
      volume:
        type: integer
      wifi_mac:
        type: string
    type: object
  models.DeviceRegistration:
    properties:
      csr_pem:
        type: string
      device_info:
        $ref: '#/definitions/models.DeviceInfo'
      device_key:
        type: string
      integrity_token:
        type: string
      nonce:
        type: string
      tenant_id:
        type: string
    type: object
  models.DeviceStatus:
    enum:
    - pending
    - active
    - disabled
    - deleted
    type: string
    x-enum-varnames:
    - DeviceStatusPending
    - DeviceStatusActive
    - DeviceStatusDisabled
    - DeviceStatusDeleted
  models.FieldTripDevice:
    properties:
      created_at:
        type: integer
      group_id:
        type: string
      hub_url:
        type: string
      id:
        type: string
      last_lat:
        type: number
      last_lng:
        type: number
      last_seen:
        type: integer
      name:
        type: string
      signing_pubkey:
        type: string
      status:
        type: string
      updated_at:
        type: integer
    type: object
  models.FieldTripGroup:
    properties:
      broadcast_sound:
        type: string
      created_at:
        type: integer
      id:
        type: string
      name:
        type: string
      update_policy:
        type: string
      updated_at:
        type: integer
    type: object
  models.GPSReport:
    properties:
      accuracy:
        type: number
      device_id:
        type: string
      lat:
        type: number
      lng:
        type: number
      timestamp:
        type: integer
    type: object
  models.HardeningConfig:
    properties:
      disable_adb_install:
        description: 禁用 ADB 安装
        type: boolean
      disable_navigation_bar:
        description: 禁用导航栏
        type: boolean
      disable_power_menu:
        description: 禁用电源菜单
        type: boolean
      disable_screen_capture:
        description: 禁用屏幕录制
        type: boolean
      disable_screenshot:
        description: 禁用截图
        type: boolean
      disable_settings_access:
        description: 禁用设置访问
        type: boolean
      disable_status_bar:
        description: 禁用状态栏
        type: boolean
      disable_usb_debug:
        description: 禁用 USB 调试
        type: boolean
      safe_boot:
        description: 安全启动
        type: boolean
    type: object
  models.NetworkConfig:
    properties:
      allow_bluetooth:
        description: 允许蓝牙
        type: boolean
      allow_mobile_data:
        description: 允许移动数据
        type: boolean
      allow_wifi:
        description: 允许 WiFi
        type: boolean
      allowed_wifi_ssids:
        description: 允许的 WiFi SSID 列表
        items:
          type: string
        type: array
      blocked_ports:
        description: 阻止的端口
        items:
          type: integer
        type: array
      proxy_address:
        description: 代理服务器地址
        type: string
    type: object
  models.PasswordPolicyConfig:
    properties:
      enabled:
        type: boolean
      lockout_duration_minutes:
        description: 分钟
        type: integer
      max_attempts:
        type: integer
      min_length:
        type: integer
      require_lowercase:
        type: boolean
      require_numbers:
        type: boolean
      require_symbols:
        type: boolean
      require_uppercase:
        type: boolean
    type: object
  models.SecurityPolicy:
    properties:
      app_whitelist:
        items:
          $ref: '#/definitions/models.AppWhitelistEntry'
        type: array
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      settings:
        $ref: '#/definitions/models.SecurityPolicySettings'
      tenant_id:
        type: string
      updated_at:
        type: string
    type: object
  models.SecurityPolicySettings:
    properties:
      app_hardening:
        allOf:
        - $ref: '#/definitions/models.AppHardeningConfig'
        description: 应用加固
      network_restrictions:
        allOf:
        - $ref: '#/definitions/models.NetworkConfig'
        description: 网络限制
      password_policy:
        allOf:
        - $ref: '#/definitions/models.PasswordPolicyConfig'
        description: 密码策略
      system_hardening:
        allOf:
        - $ref: '#/definitions/models.HardeningConfig'
        description: 系统加固
      timeout_settings:
        allOf:
        - $ref: '#/definitions/models.TimeoutConfig'
        description: 超时设置
    type: object
  models.Tenant:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      plan:
        type: string
      settings:
        additionalProperties: true
        type: object
      slug:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  models.TenantQuota:
    properties:
      api_rate_limit:
        type: integer
      max_devices:
        type: integer
      max_groups:
        type: integer
      max_users:
        type: integer
      retention_days:
        type: integer
      storage_gb:
        type: integer
    type: object
  models.TimeoutConfig:
    properties:
      inactivity_lock_timeout:
        description: 秒，无操作自动锁定
        type: integer
      lock_timeout:
        description: 秒，自动锁定时间
        type: integer
      screen_off_timeout:
        description: 秒，屏幕自动关闭时间
        type: integer
      session_timeout:
        description: 秒，会话超时时间
        type: integer
    type: object
  services.CreateTenantRequest:
    properties:
      name:
        type: string
      plan:
        type: string
      slug:
        type: string
    type: object
  services.UpdateTenantRequest:
    properties:
      name:
        type: string
      plan:
        type: string
      status:
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v2/auth/device/{deviceId}:
    delete:
      description: 吊销指定设备的访问权限
      parameters:
      - description: 设备ID
        in: path
        name: deviceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 吊销设备
      tags:
      - 认证
  /api/v2/auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用刷新令牌获取新的访问令牌
      parameters:
      - description: 刷新令牌请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 刷新访问令牌
      tags:
      - 认证
  /api/v2/auth/register:
    post:
      consumes:
      - application/json
      description: 设备注册，获取访问令牌和证书
      parameters:
      - description: 设备注册信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.DeviceRegistration'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 注册设备
      tags:
      - 认证
  /api/v2/auth/token:
    post:
      consumes:
      - application/json
      description: 根据租户ID和设备密钥获取访问令牌(仅用于测试)
      parameters:
      - description: 令牌请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.TokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 获取访问令牌
      tags:
      - 认证
  /api/v2/auth/validate/{deviceId}:
    get:
      description: 验证设备是否已注册且有效
      parameters:
      - description: 设备ID
        in: path
        name: deviceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ValidateDeviceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 验证设备
      tags:
      - 认证
  /api/v2/fieldtrip/broadcast:
    post:
      consumes:
      - application/json
      description: 向分组或所有设备发送广播消息
      parameters:
      - description: 广播请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.SendBroadcastInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Broadcast'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 发送广播
      tags:
      - 野外考察
  /api/v2/fieldtrip/commands:
    get:
      description: 设备拉取待处理的命令
      parameters:
      - description: 设备ID
        in: query
        name: device_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CommandPoll'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 拉取命令
      tags:
      - 野外考察
  /api/v2/fieldtrip/devices:
    get:
      description: 获取所有野外考察设备
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.FieldTripDevice'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 列出设备
      tags:
      - 野外考察
    post:
      consumes:
      - application/json
      description: 创建新的野外考察设备并返回二维码信息
      parameters:
      - description: 创建设备请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.CreateDeviceInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 创建设备
      tags:
      - 野外考察
  /api/v2/fieldtrip/devices/{id}:
    delete:
      description: 删除指定的野外考察设备
      parameters:
      - description: 设备ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 删除设备
      tags:
      - 野外考察
    patch:
      consumes:
      - application/json
      description: 更新野外考察设备信息（仅名称）
      parameters:
      - description: 设备ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新设备请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.UpdateDeviceInput'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 更新设备
      tags:
      - 野外考察
  /api/v2/fieldtrip/devices/{id}/location:
    post:
      consumes:
      - application/json
      description: 设备上报GPS位置信息
      parameters:
      - description: 设备ID
        in: path
        name: id
        required: true
        type: string
      - description: GPS报告
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.GPSReport'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 报告位置
      tags:
      - 野外考察
  /api/v2/fieldtrip/devices/{id}/location/history:
    get:
      description: 获取设备的位置历史记录
      parameters:
      - description: 设备ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 获取位置历史
      tags:
      - 野外考察
  /api/v2/fieldtrip/devices/{id}/whitelist:
    post:
      consumes:
      - application/json
      description: 设置设备的应用白名单
      parameters:
      - description: 设备ID
        in: path
